---
# ClickHouse Data Storage
apiVersion: v1
kind: PersistentVolume
metadata:
  name: clickhouse-db-pv-volume
  labels:
    type: local
spec:
  storageClassName: nfs-storage
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /home/douglas444/nfs-storage/honepad-events-projector-db_data
    server: blindspot.local
---
# NFS Storage Class
apiVersion: v1
kind: PersistentVolume
metadata:
  name: clickhouse-keeper-pv-volume
  labels:
    type: local
spec:
  storageClassName: nfs-storage
  capacity:
    storage: 4Gi
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /home/douglas444/nfs-storage/honepad-events-projector-keeper-db_data
    server: blindspot.local
---
# NFS Storage Class
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
