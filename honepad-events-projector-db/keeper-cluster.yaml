apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: clickhouse-keeper
  namespace: honepad-events-projector
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: nfs-storage
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 4Gi
  podTemplate: {}
  containerTemplate:
    resources:
      requests:
        cpu: "250m"
        memory: 512Mi
      limits:
        cpu: "500m"
        memory: 1Gi