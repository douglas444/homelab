apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vso-clickhouse-password
  namespace: honepad-events-projector
spec:
  type: kv-v2
  mount: kv
  path: secret/kubernetes/honepad-events-projector/db
  destination:
    name: clickhouse-password
    create: true
    type: Opaque
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        "password":
          text: >-
            {{ .Secrets.password }}
  refreshAfter: 30s
  vaultAuthRef: static-auth
