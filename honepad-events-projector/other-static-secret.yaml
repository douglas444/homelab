apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vso-honepad-events-projector-backend
  namespace: honepad-events-projector
spec:
  type: kv-v2
  mount: kv
  path: secret/kubernetes/honepad-events-projector/backend
  destination:
    name: honepad-events-projector
    create: true
    type: Opaque
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        "kafka_bootstrap_servers":
          text: >-
            {{ .Secrets.kafka_bootstrap_servers }}
        "clickhouse_password":
          text: >-
            {{ .Secrets.clickhouse_password }}
        "clickhouse_username":
          text: >-
            {{ .Secrets.clickhouse_username }}
        "clickhouse_endpoint":
          text: >-
            {{ .Secrets.clickhouse_endpoint }}
  refreshAfter: 30s
  vaultAuthRef: static-auth

