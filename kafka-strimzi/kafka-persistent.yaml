apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: combined-pool
  namespace: kafka-strimzi # <-- Fixado para o namespace correto
  labels:
    strimzi.io/cluster: my-cluster
spec:
  replicas: 2
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        kraftMetadata: shared
        # class: local-storage-class 

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  namespace: kafka-strimzi
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        tls: false
        type: nodeport
        configuration:
          brokers:
            - broker: 0
              advertisedHost: localhost
              advertisedPort: 31769
    config:
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      default.replication.factor: 2
      transaction.state.log.min.isr: 1
      min.insync.replicas: 1
  
  entityOperator:
    topicOperator: {}
    userOperator: {}